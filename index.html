    .search-result-item:hover {
        background-color: #f5f5f5;

    .result-title {

        color: #000000;
        font-size: 15px;

    .result-desc {

const searchInput = document.getElementById("searchInput");
const resultsDropdown = document.getElementById("resultsDropdown");

function wikipediaTarziAra() {
    let query = searchInput.value.toLowerCase().trim();
    resultsDropdown.innerHTML = ""; 

    if (query === "") {
        resultsDropdown.style.display = "none";
        return;
    }

    let bulunanlar = arsivVeritabani.filter(item => {
        return item.title.toLowerCase().includes(query) || 
               item.desc.toLowerCase().includes(query) || 
               item.keywords.toLowerCase().includes(query);
    });

    if (bulunanlar.length > 0) {
        bulunanlar.forEach(item => {
            let div = document.createElement("div");
            div.className = "search-result-item";
            div.innerHTML = `
                <span class="result-title">${item.title}</span>
                <span class="result-desc">${item.desc}</span>
            `;
            div.onclick = function() {
                window.location.href = item.url;
            };
            resultsDropdown.appendChild(div);
        });
        resultsDropdown.style.display = "block"; 
    } else {
        let div = document.createElement("div");
        div.className = "search-result-item";
        div.style.cursor = "default";
        div.innerHTML = `<span class="result-desc" style="text-align:center;">Aradığınız kelime bulunamadı.</span>`;
        resultsDropdown.appendChild(div);
        resultsDropdown.style.display = "block";
    }
}

searchInput.addEventListener("input", wikipediaTarziAra);

document.addEventListener("click", function(event) {
    if (!searchInput.contains(event.target) && !resultsDropdown.contains(event.target)) {
        resultsDropdown.style.display = "none";
    }
});
</script>
