<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destek Olun - INRI Archive</title>
    <style>
        body {
            background-image: linear-gradient(rgba(239, 239, 237, 0.9), rgba(239, 239, 237, 0.9)), url(destekark.webp);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #EFEFED;
            color: #111111;            
            font-family: "Times New Roman", Times, Georgia, serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .geri-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #000000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.5rem;
            transition: color 0.2s;
        }
        .geri-link:hover {
            color: #4d4c4c;
            border-color: #4d4c4c;
        }

        .form-kutusu {
            background-color: rgba(0, 0, 0, 0.9); 
            color: #ffffff;
            padding: 40px;
            border-radius: 0px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
            box-sizing: border-box;
            text-align: center;
        }

        .form-kutusu h2 {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .form-kutusu p {
            font-size: 0.95rem;
            color: #cccccc;
            margin-bottom: 30px;
            font-style: italic;
        }

        .form-grup {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-grup label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
        }

        .form-grup input, 
        .form-grup textarea {
            width: 100%;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            font-family: sans-serif; 
        }

        .form-grup input:focus, 
        .form-grup textarea:focus {
            border-color: #ffffff; 
        }

        .gonder-btn {
            width: 100%;
            padding: 15px 20px;
            font-size: 1rem;
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
            margin-top: 10px;
        }

        .gonder-btn:hover {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
        }
    </style>
</head>
<body>

    <a href="index.html" class="geri-link">Ana Sayfa</a>

    <div class="form-kutusu">
        <h2>DESTEK OLUN!</h2>
        <p>Çevirilerde hatalı bulduğunuz yerleri ya da okuyabildiğiniz yerleri bizlere iletin, incelememizden sonra sitemiz güncellenecektir.</p>
        
        <form action="https://formspree.io/f/mykrwajp" method="POST">
            <div class="form-grup">
                <label for="belge">Belge / Sayfa adı:</label>
                <input type="text" id="belge" name="belge_adi" placeholder="Örn: Minber Gazetesi Röportajı, Sayfa 3" required>
            </div>

            <div class="form-grup">
                <label for="oneri">Çeviriniz / Düzeltmeniz:</label>
                <textarea id="oneri" name="oneri_metni" rows="5" placeholder="Doğru bulduğunuz çeviriyi ya da eksik gördüğünüz kelimeyi buraya yazın..." required></textarea>
            </div>

            <div class="form-grup">
                <label for="isim">Adınız (İsteğe Bağlı):</label>
                <input type="text" id="isim" name="katki_yapan" placeholder="Destek olanlar listesi için...">
            </div>

            <button type="submit" class="gonder-btn">ONAYLA</button>
        </form>
    </div>

</body>
</html>
